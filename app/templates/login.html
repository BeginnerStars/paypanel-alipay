<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>登录</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="login-page">
  <form class="card login-card" method="post" action="/login">
    <h1>登录 PayPanel</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label>用户名<input name="username" autocomplete="username" required></label>
    <label>密码<input type="password" name="password" autocomplete="current-password" required></label>
    {% if settings.enable_2fa == '1' %}<label>2FA 验证码<input name="otp" inputmode="numeric" autocomplete="one-time-code" required></label>{% endif %}
    <button class="primary">登录</button>
  </form>
</body>
</html>
