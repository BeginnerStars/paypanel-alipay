{% extends "base.html" %}
{% block title %}发起收款 - PayPanel{% endblock %}
{% block content %}
<h1>发起收款</h1>
<form class="card form" method="post" action="/orders">
  <label>金额（元）<input name="amount" inputmode="decimal" placeholder="99.00" required></label>
  <label>商品/备注标题<input name="subject" value="支付宝收款" required></label>
  <label>支付方式
    <select name="pay_type">
      <option value="precreate">当面付 / 预创建二维码</option>
      <option value="page">电脑网站支付</option>
      <option value="wap">手机网站支付</option>
    </select>
  </label>
  <label>指定账户（可选）
    <select name="account_id">
      <option value="0">自动选择 / 失败切换</option>
      {% for account in accounts %}<option value="{{ account.id }}">{{ account.name }}</option>{% endfor %}
    </select>
  </label>
  <button class="primary">生成收款二维码</button>
</form>
{% endblock %}
