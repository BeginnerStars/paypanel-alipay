# aaPanel / Nginx reverse proxy snippet for PayPanel Alipay.
# Replace pay.example.com and 127.0.0.1:8000 with your domain and APP_HOST:APP_PORT.
# In aaPanel, add a Website for the domain, enable SSL there, then add this in
# Website -> Config or use the Reverse proxy feature to proxy to http://127.0.0.1:8000.

location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

location = /healthz {
    proxy_pass http://127.0.0.1:8000/healthz;
    access_log off;
}
